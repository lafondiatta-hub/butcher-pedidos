<script>
/* ============================================================
 * THE BUTCHER — App v3.0
 * Firebase + Google Sheets dual sync
 * 300 clientes históricos precargados
 * Reportes mensuales de consumo
 * ============================================================ */

/* ============ CLIENTES HISTÓRICOS (importados del Excel) ============ */
const CLIENTES_HISTORICOS = [];

const STORAGE_KEYS = {
  PRODUCTOS: 'butcher_productos',
  CONFIG: 'butcher_config',
  PEDIDOS: 'butcher_pedidos',
  CLIENTES: 'butcher_clientes',
  LISTAS: 'butcher_listas_disponibles'
};

let productos = [];
let config = null;
let pedidos = [];
let clientes = [];
let listasDisponibles = [];
let carrito = [];
let clienteSeleccionado = null;
let firebaseListo = false;
let unsubscribers = [];

if (window.firebaseReady) { firebaseListo = true; iniciarApp(); }
else { window.addEventListener('firebase-ready', () => { firebaseListo = true; iniciarApp(); }); }

async function iniciarApp() {
  document.getElementById('app').innerHTML = `
    <div class="header"><h1>🥩 THE BUTCHER</h1><p>Conectando...</p></div>
    <div class="setup-screen"><div style="text-align:center; padding:40px;"><div style="font-size:40px; margin-bottom:10px;">☁️</div><p>Cargando datos...</p></div></div>
  `;
  try {
    await cargarDesdeFirebase();
    
    // NUEVO: Importar clientes históricos si no están en Firebase
    if (false && clientes.length < 50 && CLIENTES_HISTORICOS.length > 0) {
      await importarClientesHistoricos();
    }
    
    const localData = {
      productos: JSON.parse(localStorage.getItem('butcher_productos') || '[]'),
      pedidos: JSON.parse(localStorage.getItem('butcher_pedidos') || '[]'),
      clientes: JSON.parse(localStorage.getItem('butcher_clientes') || '[]'),
    };
    const hayDatosLocales = localData.productos.length > 0 || localData.pedidos.length > 0;
    const hayDatosNube = productos.length > 0 || pedidos.length > 0;
    if (hayDatosLocales && !hayDatosNube && !localStorage.getItem('butcher_migrated')) {
      if (confirm('🔄 Detectamos datos locales (' + localData.pedidos.length + ' pedidos). ¿Migrar a la nube?')) {
        await migrarDatosLocales(localData);
        localStorage.setItem('butcher_migrated', '1');
        showToast('✅ Datos migrados', false, 'success');
      } else { localStorage.setItem('butcher_migrated', '1'); }
    }
    suscribirseACambios();
    if (productos.length === 0 || !config) renderSetup();
    else renderApp();
  } catch (err) {
    console.error('Error iniciando:', err);
    document.getElementById('app').innerHTML = `
      <div class="header"><h1>🥩 THE BUTCHER</h1><p>Error</p></div>
      <div class="setup-screen"><p style="color:red;">❌ Error: ${err.message}</p>
      <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;">Reintentar</button></div>
    `;
  }
}

/* ============ IMPORTAR CLIENTES HISTÓRICOS ============ */
async function importarClientesHistoricos() {
  const { collection, addDoc, getDocs } = window.firebaseFns;
  const db = window.firebaseDB;
  
  showToast('Importando 300 clientes históricos...');
  
  // Get existing client names to avoid duplicates
  const existentes = new Set(clientes.map(c => c.nombre.trim().toLowerCase()));
  let importados = 0;
  
  for (const ch of CLIENTES_HISTORICOS) {
    if (existentes.has(ch.nombre.trim().toLowerCase())) continue;
    
    const nuevoCliente = {
      nombre: ch.nombre,
      telefono: ch.telefono || '',
      direccion: ch.direccion || '',
      fechaAlta: new Date().toISOString().slice(0,10),
      ultimoPedido: '',
      cantPedidos: ch.cantPedidos || 0,
      totalGastado: ch.totalGastado || 0,
      notas: 'Importado del historial'
    };
    
    try {
      const ref = await addDoc(collection(db, 'clientes'), nuevoCliente);
      clientes.push({ _id: ref.id, ...nuevoCliente });
      importados++;
    } catch(e) { console.error('Error importando cliente:', ch.nombre, e); }
  }
  
  if (importados > 0) {
    showToast(`✅ ${importados} clientes históricos importados`, false, 'success');
  }
}

async function cargarDesdeFirebase() {

  try { const d = await getDocs(collection(db, 'clientes')); clientes = d.docs.map(x => ({ _id: x.id, ...x.data() })); } catch(e) { clientes = []; }
  try { const q = query(collection(db, 'pedidos'), orderBy('timestamp', 'desc')); const d = await getDocs(q); pedidos = d.docs.map(x => ({ _id: x.id, ...x.data() })); } catch(e) { pedidos = []; }

function suscribirseACambios() {
  const { collection, onSnapshot, query, orderBy } = window.firebaseFns;
  const db = window.firebaseDB;
  unsubscribers.forEach(u => u()); unsubscribers = [];
  const u1 = onSnapshot(query(collection(db, 'pedidos'), orderBy('timestamp', 'desc')), (s) => {
    pedidos = s.docs.map(d => ({ _id: d.id, ...d.data() }));
    const v = document.getElementById('app').getAttribute('data-vista');
    if (v === 'pedidos') renderPedidos();

  });
  unsubscribers.push(u1);
  const u2 = onSnapshot(collection(db, 'clientes'), (s) => { clientes = s.docs.map(d => ({ _id: d.id, ...d.data() })); });
  unsubscribers.push(u2);
}

async function migrarDatosLocales(localData) {
  const { collection, addDoc, setDoc, doc } = window.firebaseFns;
  const db = window.firebaseDB;
  for (const p of localData.productos) await addDoc(collection(db, 'productos'), p);
  productos = localData.productos;
  const cl = JSON.parse(localStorage.getItem('butcher_config') || 'null');
  const ll = JSON.parse(localStorage.getItem('butcher_listas_disponibles') || '[]');
  if (cl) { await setDoc(doc(db, 'config', 'main'), { ...cl, listasDisponibles: ll }); config = cl; listasDisponibles = ll; }
  for (const c of localData.clientes) { const r = await addDoc(collection(db, 'clientes'), c); clientes.push({ _id: r.id, ...c }); }
  for (const p of localData.pedidos) { const pd = { ...p, estado: p.estado||'pendiente', metodoPago: p.metodoPago||'', fechaPago: p.fechaPago||'', timestamp: p.timestamp||new Date().toISOString() }; await addDoc(collection(db, 'pedidos'), pd); }
}

/* ============ GOOGLE SHEETS SYNC ============ */
// Google Apps Script hace un redirect 302 al responder.
// Para manejar eso correctamente usamos redirect:'follow' y mode:'cors'.
// Si CORS falla (ej: archivo local), usamos un fallback con no-cors.
async function enviarAGoogleSheets(pedido) {
  const url = config && config.sheetsUrl;
  if (!url) return { success: false, error: 'No hay URL de Google Sheets configurada' };
  
  const payload = JSON.stringify({
    action: 'guardarPedido',
    pedido: {
      ...pedido,
      vendedor: pedido.vendedor || config.vendedor || 'App'
    }
  });
  
  console.log('[Sheets] Enviando pedido a:', url);
  
  try {
    // Intento 1: fetch normal con redirect follow
    const resp = await fetch(url, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: payload
    });
    
    // Google Apps Script devuelve JSON después del redirect
    const text = await resp.text();
    console.log('[Sheets] Respuesta:', text);
    
    try {
      const result = JSON.parse(text);
      return result;
    } catch(e) {
      // Si no es JSON válido pero la request fue 200, probablemente funcionó
      if (resp.ok) return { success: true, message: 'Enviado (sin confirmación JSON)' };
      return { success: false, error: 'Respuesta no válida: ' + text.substring(0, 100) };
    }
  } catch(err) {
    console.warn('[Sheets] Fetch normal falló, intentando con no-cors:', err.message);
    
    // Intento 2: no-cors (no podemos leer la respuesta, pero el POST llega)
    try {
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: payload
      });
      // Con no-cors no podemos leer la respuesta, pero el pedido se envió
      return { success: true, message: 'Enviado (modo no-cors, verificá el Sheet)' };
    } catch(err2) {
      console.error('[Sheets] Error total:', err2);
      return { success: false, error: 'No se pudo conectar: ' + err2.message };
    }
  }
}

/* ============ LECTURA DE EXCEL ============ */
function onExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  showToast('Procesando Excel...');
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      let sn = wb.SheetNames.find(n => n.toLowerCase() === 'precios') || wb.SheetNames[0];
      const sheet = wb.Sheets[sn];
      const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });
      if (json.length < 2) throw new Error('Excel vacío');
      const headers = json[0].map(h => h ? String(h).trim() : '');
      const colP = headers.findIndex(h => h.toLowerCase() === 'producto');
      const colC = headers.findIndex(h => h.toLowerCase().includes('categor'));
      const colT = headers.findIndex(h => h.toLowerCase() === 'tipo');
      const colK = headers.findIndex(h => h.toLowerCase().includes('kg aprox'));
      if (colP === -1) throw new Error('No se encontró columna "Producto"');
      if (colT === -1) throw new Error('No se encontró columna "Tipo"');
      const colsMeta = [colP, colC, colT, colK].filter(c => c !== -1);
      const colsPrecios = [];
      for (let i = 0; i < headers.length; i++) { if (!colsMeta.includes(i) && headers[i]) colsPrecios.push({ idx: i, nombre: headers[i] }); }
      if (colsPrecios.length === 0) throw new Error('No hay columnas de precios');
      const prodNuevos = [];
      for (let i = 1; i < json.length; i++) {
        const f = json[i]; const nom = f[colP]; const tipo = colT !== -1 ? f[colT] : null;
        if (!nom || !tipo) continue;
        const precios = {};
        colsPrecios.forEach(c => { const v = f[c.idx]; if (v && Number(v) > 0) precios[c.nombre] = Number(v); });
        if (Object.keys(precios).length === 0) continue;
        prodNuevos.push({ nombre: String(nom).trim(), categoria: colC !== -1 && f[colC] ? String(f[colC]).trim() : 'Otros', tipo: String(tipo).trim().toLowerCase(), kgAprox: colK !== -1 ? Number(f[colK]) || 0 : 0, precios });
      }
      if (prodNuevos.length === 0) throw new Error('No se encontraron productos');
      const { collection, addDoc, setDoc, doc, getDocs, deleteDoc } = window.firebaseFns;
      const db = window.firebaseDB;
      const viejos = await getDocs(collection(db, 'productos'));
      for (const d of viejos.docs) await deleteDoc(doc(db, 'productos', d.id));
      const guardados = [];
      for (const p of prodNuevos) { const r = await addDoc(collection(db, 'productos'), p); guardados.push({ _id: r.id, ...p }); }
      productos = guardados;
      listasDisponibles = colsPrecios.map(c => c.nombre);
      if (!config) config = { alias: 'thebutcher.lemon', titular: 'Juan Pablo Aduna', listaActiva: listasDisponibles[listasDisponibles.length-1], listasDisponibles, sheetsUrl: '', vendedor: 'JP' };
      else { if (!listasDisponibles.includes(config.listaActiva)) config.listaActiva = listasDisponibles[listasDisponibles.length-1]; config.listasDisponibles = listasDisponibles; }
      await setDoc(doc(db, 'config', 'main'), config);
      showToast(`✓ ${prodNuevos.length} productos · ${listasDisponibles.length} listas`, false, 'success');
      setTimeout(() => renderApp(), 800);
    } catch (err) { console.error(err); showToast('Error: ' + err.message, true); }
  };
  reader.readAsArrayBuffer(file);
}

function normalizar(s) { return String(s || '').trim().toLowerCase().replace(/\s+/g, ' '); }

function onClienteInput() {
  const input = document.getElementById('cliente');
  const valor = input.value, valorNorm = normalizar(valor);
  const sugg = document.getElementById('clienteSuggestions');
  const exacto = clientes.find(c => normalizar(c.nombre) === valorNorm);
  if (exacto && valor.trim()) {
    clienteSeleccionado = exacto;
    if (!document.getElementById('telefono').value) document.getElementById('telefono').value = exacto.telefono || '';
    if (!document.getElementById('direccion').value) document.getElementById('direccion').value = exacto.direccion || '';
    mostrarInfoCliente(exacto);
    document.getElementById('clienteBadge').innerHTML = '<span class="badge-existing">✓ Existente</span>';
  } else {
    clienteSeleccionado = null; ocultarInfoCliente();
    document.getElementById('clienteBadge').innerHTML = valor.trim() ? '<span class="badge-new">Nuevo</span>' : '';
  }
  if (valorNorm.length >= 1) {
    const matches = clientes.filter(c => normalizar(c.nombre).includes(valorNorm)).slice(0, 8);
    if (matches.length > 0) {
      sugg.innerHTML = matches.map(c => {
        const idx = clientes.indexOf(c);
        return `<div class="autocomplete-item" onmousedown="seleccionarCliente(${idx})">
          <div class="name">${escapeHtml(c.nombre)}</div>
          <div class="meta">${c.cantPedidos} pedido${c.cantPedidos!==1?'s':''} ${c.telefono?' · '+escapeHtml(c.telefono):''} ${c.direccion?' · 📍':''}</div>
        </div>`;
      }).join('');
      sugg.classList.add('active');
    } else sugg.classList.remove('active');
  } else sugg.classList.remove('active');
}

/* ============ GENERAR RESUMEN ============ */
async function generarResumen() {
  const cliente = document.getElementById('cliente').value.trim();
  const telefono = document.getElementById('telefono').value.trim();
  const direccion = document.getElementById('direccion').value.trim();
  const fecha = document.getElementById('fecha').value;
  const vendedor = document.getElementById('vendedor').value;
  const estadoPedido = document.getElementById('estadoPedido').value;
  if (!cliente) { showToast('Ingresá el nombre del cliente', true); return; }
  if (carrito.length === 0) { showToast('Agregá al menos un producto', true); return; }
  const sub = carrito.reduce((s, i) => s + i.subtotal, 0);
  const dp = parseFloat(document.getElementById('descuento').value) || 0;
  const dm = sub * (dp / 100), tot = sub - dm;
  const pedido = {
    id: 'PED-' + Date.now(), cliente, telefono, direccion, fecha, vendedor,
    listaPrecios: config.listaActiva, items: [...carrito],
    subtotalPedido: sub, descuentoPct: dp, descuentoMonto: dm, totalFinal: tot,
    alias: config.alias, titular: config.titular, timestamp: new Date().toISOString()
  };
  if (estadoPedido === 'pagado') { abrirModalCobroNuevoPedido(pedido); return; }
  pedido.estado = 'pendiente'; pedido.metodoPago = ''; pedido.fechaPago = ''; pedido.notasCobro = '';
  await guardarPedidoCompleto(pedido);
  sessionStorage.setItem('pedidoActual', JSON.stringify(pedido));
  renderResumen(pedido);
}

/* NUEVO: Guardar en Firebase + Google Sheets en paralelo */
async function guardarPedidoCompleto(pedido) {
  // 1. Firebase (como antes)
  await guardarPedidoEnFirebase(pedido);
  
  // 2. Google Sheets
  if (config && config.sheetsUrl) {
    showToast('📋 Enviando a Google Sheets...', false);
    const result = await enviarAGoogleSheets(pedido);
    console.log('[Sheets] Resultado:', result);
    if (result.success) {
      showToast('✅ Guardado en Firebase + Google Sheets', false, 'success');
    } else {
      showToast('⚠️ Firebase OK, error en Sheets: ' + (result.error || 'desconocido'), true);
    }
  } else {
    showToast('✅ Guardado en Firebase (Google Sheets no configurado)', false, 'success');
  }
}

async function guardarPedidoEnFirebase(pedido) {
  try {
    const { collection, addDoc, updateDoc, doc } = window.firebaseFns;
    const db = window.firebaseDB;
    const clienteNorm = normalizar(pedido.cliente);
    let ce = clientes.find(c => normalizar(c.nombre) === clienteNorm);
    if (ce) {
      const u = { ultimoPedido: pedido.fecha, cantPedidos: (ce.cantPedidos||0)+1, totalGastado: (ce.totalGastado||0)+pedido.totalFinal };
      if (pedido.telefono && !ce.telefono) u.telefono = pedido.telefono;
      if (pedido.direccion && !ce.direccion) u.direccion = pedido.direccion;
      await updateDoc(doc(db, 'clientes', ce._id), u);
    } else {
      const nc = { nombre: pedido.cliente, telefono: pedido.telefono, direccion: pedido.direccion, fechaAlta: pedido.fecha, ultimoPedido: pedido.fecha, cantPedidos: 1, totalGastado: pedido.totalFinal, notas: '' };
      await addDoc(collection(db, 'clientes'), nc);
    }
    await addDoc(collection(db, 'pedidos'), pedido);
  } catch(err) { console.error('Error Firebase:', err); showToast('⚠️ Error guardando en Firebase', true); }
}

function cerrarConfig() { document.getElementById('modalConfig').classList.remove('active'); }
async function guardarConfig() {
  config.alias = document.getElementById('cfgAlias').value.trim() || 'thebutcher.lemon';
  config.titular = document.getElementById('cfgTitular').value.trim() || 'Juan Pablo Aduna';
  config.listaActiva = document.getElementById('cfgLista').value;
  config.sheetsUrl = document.getElementById('cfgSheetsUrl').value.trim();
  config.vendedor = document.getElementById('cfgVendedor').value;
  config.listasDisponibles = listasDisponibles;
  try {
    const { setDoc, doc } = window.firebaseFns; const db = window.firebaseDB;
    await setDoc(doc(db, 'config', 'main'), config);
    
    // Test Google Sheets connection
    if (config.sheetsUrl) {
      try {
        const r = await fetch(config.sheetsUrl + '?action=ping', { redirect: 'follow' });
        const t = await r.text();
        try {
          const j = JSON.parse(t);
          if (j.success) showToast('✅ Config guardada · Google Sheets conectado', false, 'success');
          else showToast('✅ Config guardada · Sheets respondió pero sin éxito', true);
        } catch(e) {
          showToast('✅ Config guardada · Sheets respondió', false, 'success');
        }
      } catch(e) {
        // Intentar no-cors ping
        try {
          await fetch(config.sheetsUrl + '?action=ping', { mode: 'no-cors', redirect: 'follow' });
          showToast('✅ Config guardada · Sheets parece accesible', false, 'success');
        } catch(e2) {
          showToast('⚠️ Config guardada pero Sheets no responde. Verificá la URL.', true);
        }
      }
    } else {
      showToast('✓ Configuración guardada', false, 'success');
    }
    cerrarConfig(); renderApp();
  } catch(err) { showToast('Error: ' + err.message, true); }
}

function abrirReporte() {
  if (!config || !config.sheetsUrl) {
    showToast('⚠️ Primero configurá la URL de Google Sheets en Configuración', true);
    return;
  }
  const sm = document.getElementById('reporteMes'); sm.innerHTML = '';
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const mesActual = new Date().getMonth();
  meses.forEach((m, i) => { const o = document.createElement('option'); o.value = i + 1; o.textContent = m; if (i === mesActual) o.selected = true; sm.appendChild(o); });
  const sa = document.getElementById('reporteAnio'); sa.innerHTML = '';
  const anioActual = new Date().getFullYear();
  for (let a = anioActual; a >= anioActual - 2; a--) { const o = document.createElement('option'); o.value = a; o.textContent = a; sa.appendChild(o); }
  document.getElementById('reporteResultado').style.display = 'none';
  document.getElementById('modalReporte').classList.add('active');
}
function cerrarReporte() { document.getElementById('modalReporte').classList.remove('active'); }

async function ejecutarReporte() {
  const mes = parseInt(document.getElementById('reporteMes').value);
  const anio = parseInt(document.getElementById('reporteAnio').value);
  const btn = document.getElementById('btnGenerarReporte');
  btn.disabled = true; btn.textContent = 'Generando...';
  
  try {
    let result;
    try {
      const resp = await fetch(config.sheetsUrl, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'generarReporteMensual', mes, anio })
      });
      const text = await resp.text();
      result = JSON.parse(text);
    } catch(corsErr) {
      // Fallback no-cors
      await fetch(config.sheetsUrl, {
        method: 'POST',
        mode: 'no-cors',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'generarReporteMensual', mes, anio })
      });
      result = { success: true, message: 'Solicitud enviada. Verificá tu Google Sheet en unos segundos.' };
    }
    const rd = document.getElementById('reporteResultado');
    rd.style.display = 'block';
    if (result.success) {
      rd.innerHTML = `<div style="background:#e8f5e9; padding:12px; border-radius:8px; color:#1b5e20;">✅ ${result.message}<br><small>Abrí tu Google Sheet para ver la nueva pestaña "${result.tab}"</small></div>`;
    } else {
      rd.innerHTML = `<div style="background:#ffebee; padding:12px; border-radius:8px; color:#c62828;">❌ ${result.error}</div>`;
    }
  } catch(e) {
    document.getElementById('reporteResultado').style.display = 'block';
    document.getElementById('reporteResultado').innerHTML = `<div style="background:#ffebee; padding:12px; border-radius:8px; color:#c62828;">❌ Error de conexión: ${e.message}</div>`;
  }
  btn.disabled = false; btn.textContent = 'Generar reporte';
}

function exportarPedidosExcel() {
  if (pedidos.length === 0) { showToast('No hay pedidos', true); return; }
  const wb = XLSX.utils.book_new();
  const fp = [['ID','Fecha','Vendedor','Cliente','Telefono','Direccion','Items','Subtotal','Desc%','Desc$','Total','Estado','Metodo','Fecha Cobro']];
  pedidos.forEach(p => fp.push([p.id||p._id, p.fecha, p.vendedor||'', p.cliente, p.telefono||'', p.direccion||'', p.items.length, p.subtotalPedido, p.descuentoPct||0, p.descuentoMonto||0, p.totalFinal, p.estado||'pendiente', p.metodoPago||'', p.fechaPago||'']));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(fp), 'Pedidos');
  const fd = [['ID Pedido','Fecha','Cliente','Producto','Tipo','Cantidad','Precio','Subtotal']];
  pedidos.forEach(p => p.items.forEach(i => fd.push([p.id||p._id, p.fecha, p.cliente, i.producto, i.tipo, i.pesoOCantidad, i.precio, i.subtotal])));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(fd), 'Detalle');
  const fc = [['Nombre','Telefono','Direccion','Pedidos','Total']];
  clientes.forEach(c => fc.push([c.nombre, c.telefono||'', c.direccion||'', c.cantPedidos||0, c.totalGastado||0]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(fc), 'Clientes');
  XLSX.writeFile(wb, 'Butcher_' + new Date().toISOString().slice(0,10) + '.xlsx');
  showToast('Excel descargado ✓', false, 'success');
}

function cerrarModalCobro() { document.getElementById('modalCobro').classList.remove('active'); pedidoIdCobro = null; if (pedidoNuevoPendiente) { pedidoNuevoPendiente = null; showToast('Pedido no guardado', false); } }
function seleccionarMetodo(btn, met) { document.querySelectorAll('.metodo-pago-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); document.getElementById('cobroMetodo').value = met; }
function toggleTipoPago(tipo) { document.getElementById('cobroTipo').value = tipo; document.getElementById('cobroSeccionParcial').style.display = tipo==='parcial'?'block':'none'; document.querySelectorAll('.tipo-pago-btn').forEach(b => b.classList.remove('selected')); document.querySelector('.tipo-pago-btn[data-tipo="'+tipo+'"]').classList.add('selected'); }

async function confirmarCobro() {
  const metodo = document.getElementById('cobroMetodo').value;
  const fecha = document.getElementById('cobroFecha').value;
  const notas = document.getElementById('cobroNotas').value.trim();
  const tipo = document.getElementById('cobroTipo').value;
  if (!metodo) { showToast('Elegí método de pago', true); return; }
  
  if (pedidoNuevoPendiente) {
    const ped = pedidoNuevoPendiente;
    if (tipo === 'parcial') { const m = parseFloat(document.getElementById('cobroMontoParcial').value); if (!m||m<=0||m>=ped.totalFinal) { showToast('Monto parcial inválido', true); return; } ped.estado = 'parcial'; ped.montoParcial = m; }
    else { ped.estado = 'pagado'; ped.montoParcial = ped.totalFinal; }
    ped.metodoPago = metodo; ped.fechaPago = fecha; ped.notasCobro = notas;
    cerrarModalCobro(); pedidoNuevoPendiente = null;
    await guardarPedidoCompleto(ped);
    sessionStorage.setItem('pedidoActual', JSON.stringify(ped));
    renderResumen(ped);
    return;
  }
  
  if (!pedidoIdCobro) return;
  const ped = pedidos.find(p => p._id === pedidoIdCobro); if (!ped) return;
  const upd = { metodoPago: metodo, fechaPago: fecha, notasCobro: notas };
  if (tipo === 'parcial') { const m = parseFloat(document.getElementById('cobroMontoParcial').value); if (!m||m<=0||m>=ped.totalFinal) { showToast('Monto inválido', true); return; } upd.estado = 'parcial'; upd.montoParcial = m; }
  else { upd.estado = 'pagado'; upd.montoParcial = ped.totalFinal; }
  try { const { updateDoc, doc } = window.firebaseFns; await updateDoc(doc(window.firebaseDB, 'pedidos', pedidoIdCobro), upd); cerrarModalCobro(); showToast('✅ Cobro registrado', false, 'success'); } catch(e) { showToast('Error: '+e.message, true); }
}

async function marcarPendiente(id) {
  if (!confirm('¿Revertir a pendiente?')) return;
  try { const { updateDoc, doc } = window.firebaseFns; await updateDoc(doc(window.firebaseDB, 'pedidos', id), { estado: 'pendiente', metodoPago: '', fechaPago: '' }); showToast('↩️ Revertido', false, 'success'); } catch(e) { showToast('Error: '+e.message, true); }
}

function verDetallePedido(id) { const p = pedidos.find(x => x._id === id); if (!p) return; sessionStorage.setItem('pedidoActual', JSON.stringify(p)); renderResumen(p); }

async function eliminarPedido(id) {
  const p = pedidos.find(x => x._id === id); if (!p) return;
  if (!confirm(`¿Eliminar pedido de "${p.cliente}" por $${formatNum(p.totalFinal)}?`)) return;
  try {
    const { deleteDoc, doc, updateDoc } = window.firebaseFns; const db = window.firebaseDB;
    await deleteDoc(doc(db, 'pedidos', id));
    const cl = clientes.find(c => normalizar(c.nombre) === normalizar(p.cliente));
    if (cl) await updateDoc(doc(db, 'clientes', cl._id), { cantPedidos: Math.max(0,(cl.cantPedidos||1)-1), totalGastado: Math.max(0,(cl.totalGastado||0)-(p.totalFinal||0)) });
    showToast('🗑️ Eliminado', false, 'success');
  } catch(e) { showToast('Error: '+e.message, true); }
}

/* ============ HELPERS ============ */
function formatNum(n) { return Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function formatFecha(iso) { if (!iso) return ''; const [y,m,d] = iso.split('-'); return `${d}/${m}/${y.slice(2)}`; }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg, isErr, type) { const t = document.getElementById('toast'); t.textContent = msg; let cls = 'toast show'; if (isErr) cls += ' error'; else if (type === 'success') cls += ' success'; t.className = cls; setTimeout(() => t.classList.remove('show'), 3000); }
</script>
