<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, getDocs, doc, setDoc, updateDoc, deleteDoc,
    query, orderBy, onSnapshot, serverTimestamp, where
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyCWu9hS9diVphJqr43IM8EmQBGg-ZGUU5Y",
    authDomain: "butcher-pedidos.firebaseapp.com",
    projectId: "butcher-pedidos",
    storageBucket: "butcher-pedidos.firebasestorage.app",
    messagingSenderId: "207535590543",
    appId: "1:207535590543:web:5e6e286531882119c534fa"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  // Exponer Firebase al scope global de la app
  window.firebaseDB = db;
  window.firebaseFns = {
    collection, addDoc, getDocs, doc, setDoc, updateDoc, deleteDoc,
    query, orderBy, onSnapshot, serverTimestamp, where
  };
  window.firebaseReady = true;
  
  // Disparar evento para que la app sepa que está lista
  window.dispatchEvent(new Event('firebase-ready'));

<body>

<div class="container" id="app">

<!-- MODAL COBRO -->
<div class="modal-overlay" id="modalCobro">
  <div class="modal" style="max-width:520px;">
    <h3>💰 Registrar cobro</h3>
    
    <div id="cobroPedidoInfo" style="background:var(--cream); padding:12px; border-radius:8px; margin-bottom:16px;"></div>
    
    <label style="margin-bottom:8px;">Tipo de pago</label>

<script>
/* ============================================================
 * THE BUTCHER - App Standalone
 * Datos en localStorage + Excel como fuente de productos
 * ============================================================ */

const STORAGE_KEYS = {
  PRODUCTOS: 'butcher_productos',
  CONFIG: 'butcher_config',
  PEDIDOS: 'butcher_pedidos',
  CLIENTES: 'butcher_clientes',
  LISTAS: 'butcher_listas_disponibles'
};

// Estado global
let productos = [];
let config = null;
let pedidos = [];
let clientes = [];
let listasDisponibles = [];
let carrito = [];
let clienteSeleccionado = null;

/* ============ INICIALIZACIÓN - FIREBASE ============ */
let firebaseListo = false;
let unsubscribers = [];

// Esperar a que Firebase esté listo
if (window.firebaseReady) {
  firebaseListo = true;
  iniciarApp();
} else {
  window.addEventListener('firebase-ready', () => {
    firebaseListo = true;
    iniciarApp();
  });
}

async function iniciarApp() {
  // Mostrar loading
  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>🥩 THE BUTCHER</h1>
      <p>Conectando con la nube...</p>
    </div>
    <div class="setup-screen">
      <div style="text-align:center; padding: 40px;">
        <div style="font-size:40px; margin-bottom: 10px;">☁️</div>
        <p>Cargando datos de Firebase...</p>
      </div>
    </div>
  `;
  
  try {
    // Cargar todo desde Firebase
    await cargarDesdeFirebase();
    
    // Si hay datos en localStorage y no hay en Firebase, ofrecer migración
    const localData = {
      productos: JSON.parse(localStorage.getItem('butcher_productos') || '[]'),
      pedidos: JSON.parse(localStorage.getItem('butcher_pedidos') || '[]'),
      clientes: JSON.parse(localStorage.getItem('butcher_clientes') || '[]'),
    };
    
    const hayDatosLocales = localData.productos.length > 0 || localData.pedidos.length > 0;
    const hayDatosNube = productos.length > 0 || pedidos.length > 0;
    
    if (hayDatosLocales && !hayDatosNube && !localStorage.getItem('butcher_migrated')) {
      if (confirm('🔄 Detectamos datos guardados localmente (' + localData.pedidos.length + ' pedidos, ' + localData.clientes.length + ' clientes). ¿Querés migrarlos a la nube ahora?')) {
        await migrarDatosLocales(localData);
        localStorage.setItem('butcher_migrated', '1');
        showToast('✅ Datos migrados a la nube', false, 'success');
      } else {
        localStorage.setItem('butcher_migrated', '1');
      }
    }
    
    // Suscribirse a cambios en tiempo real
    suscribirseACambios();
    
    // Renderizar app
    if (productos.length === 0 || !config) {
      renderSetup();
    } else {
      renderApp();
    }
  } catch (err) {
    console.error('Error iniciando app:', err);
    document.getElementById('app').innerHTML = `
      <div class="header">
        <h1>🥩 THE BUTCHER</h1>
        <p>Error de conexión</p>
      </div>
      <div class="setup-screen">
        <p style="color:red;">❌ Error conectando con Firebase: ${err.message}</p>
        <button class="btn btn-primary" onclick="location.reload()" style="margin-top:20px;">Reintentar</button>
      </div>
    `;
  }
}

async function cargarDesdeFirebase() {
  const { collection, getDocs, doc, query, orderBy } = window.firebaseFns;
  const db = window.firebaseDB;
  
  // Cargar config
  try {
    const configDocs = await getDocs(collection(db, 'config'));
    if (!configDocs.empty) {
      const configData = configDocs.docs[0].data();
      config = configData;
      listasDisponibles = configData.listasDisponibles || [];
    } else {
      config = null;
    }
  } catch(e) { console.error('Error cargando config:', e); }
  
  // Cargar productos
  try {
    const productosDocs = await getDocs(collection(db, 'productos'));
    productos = productosDocs.docs.map(d => ({ _id: d.id, ...d.data() }));
  } catch(e) { console.error('Error cargando productos:', e); productos = []; }
  
  // Cargar clientes
  try {
    const clientesDocs = await getDocs(collection(db, 'clientes'));
    clientes = clientesDocs.docs.map(d => ({ _id: d.id, ...d.data() }));
  } catch(e) { console.error('Error cargando clientes:', e); clientes = []; }
  
  // Cargar pedidos (ordenados por fecha desc)
  try {
    const q = query(collection(db, 'pedidos'), orderBy('timestamp', 'desc'));
    const pedidosDocs = await getDocs(q);
    pedidos = pedidosDocs.docs.map(d => ({ _id: d.id, ...d.data() }));
  } catch(e) { console.error('Error cargando pedidos:', e); pedidos = []; }
}

function suscribirseACambios() {
  const { collection, onSnapshot, query, orderBy } = window.firebaseFns;
  const db = window.firebaseDB;
  
  // Limpiar suscripciones anteriores
  unsubscribers.forEach(u => u());
  unsubscribers = [];
  
  // Suscribirse a pedidos en tiempo real
  const unsubPedidos = onSnapshot(
    query(collection(db, 'pedidos'), orderBy('timestamp', 'desc')),
    (snapshot) => {
      pedidos = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }));
      // Re-renderizar vista activa si corresponde
      const vista = document.getElementById('app').getAttribute('data-vista');
      if (vista === 'pedidos') renderPedidos();
      if (vista === 'main') actualizarContadorPedidos();
    }
  );
  unsubscribers.push(unsubPedidos);
  
  // Suscribirse a clientes
  const unsubClientes = onSnapshot(collection(db, 'clientes'), (snapshot) => {
    clientes = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }));
  });
  unsubscribers.push(unsubClientes);
}

async function migrarDatosLocales(localData) {
  const { collection, addDoc, setDoc, doc } = window.firebaseFns;
  const db = window.firebaseDB;
  
  // Migrar productos
  for (const p of localData.productos) {
    await addDoc(collection(db, 'productos'), p);
  }
  productos = localData.productos;
  
  // Migrar config
  const configLocal = JSON.parse(localStorage.getItem('butcher_config') || 'null');
  const listasLocal = JSON.parse(localStorage.getItem('butcher_listas_disponibles') || '[]');
  if (configLocal) {
    await setDoc(doc(db, 'config', 'main'), { ...configLocal, listasDisponibles: listasLocal });
    config = configLocal;
    listasDisponibles = listasLocal;
  }
  
  // Migrar clientes
  const clientesMigrados = [];
  for (const c of localData.clientes) {
    const ref = await addDoc(collection(db, 'clientes'), c);
    clientesMigrados.push({ _id: ref.id, ...c });
  }
  clientes = clientesMigrados;
  
  // Migrar pedidos (con estado inicial "pendiente")
  const pedidosMigrados = [];
  for (const p of localData.pedidos) {
    const pedidoConEstado = {
      ...p,
      estado: p.estado || 'pendiente',
      metodoPago: p.metodoPago || '',
      fechaPago: p.fechaPago || '',
      timestamp: p.timestamp || new Date().toISOString()
    };
    const ref = await addDoc(collection(db, 'pedidos'), pedidoConEstado);
    pedidosMigrados.push({ _id: ref.id, ...pedidoConEstado });
  }
  pedidos = pedidosMigrados;
}

/* ============ LECTURA DE EXCEL ============ */
function onExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  showToast('Procesando Excel...');
  
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      
      // Buscar hoja "Precios"
      let sheetName = workbook.SheetNames.find(n => n.toLowerCase() === 'precios');
      if (!sheetName) sheetName = workbook.SheetNames[0]; // Primera hoja si no existe "Precios"
      
      const sheet = workbook.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });
      
      if (json.length < 2) throw new Error('El Excel está vacío');
      
      const headers = json[0].map(h => h ? String(h).trim() : '');
      
      // Detectar columnas
      const colProducto = headers.findIndex(h => h.toLowerCase() === 'producto');
      const colCategoria = headers.findIndex(h => h.toLowerCase() === 'categoría' || h.toLowerCase() === 'categoria');
      const colTipo = headers.findIndex(h => h.toLowerCase() === 'tipo');
      const colKgAprox = headers.findIndex(h => h.toLowerCase().includes('kg aprox'));
      
      if (colProducto === -1) throw new Error('No se encontró columna "Producto"');
      if (colTipo === -1) throw new Error('No se encontró columna "Tipo" (debe tener valores kg/unidad)');
      
      // Detectar columnas de precios (todas las que no son metadata)
      const colsMetadata = [colProducto, colCategoria, colTipo, colKgAprox].filter(c => c !== -1);
      const colsPrecios = [];
      for (let i = 0; i < headers.length; i++) {
        if (!colsMetadata.includes(i) && headers[i]) {
          colsPrecios.push({ idx: i, nombre: headers[i] });
        }
      }
      
      if (colsPrecios.length === 0) throw new Error('No se encontraron columnas de precios');
      
      // Construir productos (cada producto con todos sus precios)
      const productosNuevos = [];
      for (let i = 1; i < json.length; i++) {
        const fila = json[i];
        const nombre = fila[colProducto];
        const tipo = colTipo !== -1 ? fila[colTipo] : null;
        
        if (!nombre || !tipo) continue;
        
        const precios = {};
        colsPrecios.forEach(c => {
          const val = fila[c.idx];
          if (val && Number(val) > 0) {
            precios[c.nombre] = Number(val);
          }
        });
        
        if (Object.keys(precios).length === 0) continue;
        
        productosNuevos.push({
          nombre: String(nombre).trim(),
          categoria: colCategoria !== -1 && fila[colCategoria] ? String(fila[colCategoria]).trim() : 'Otros',
          tipo: String(tipo).trim().toLowerCase(),
          kgAprox: colKgAprox !== -1 ? Number(fila[colKgAprox]) || 0 : 0,
          precios: precios
        });
      }
      
      if (productosNuevos.length === 0) throw new Error('No se encontraron productos válidos');
      
      // Guardar en Firebase
      const { collection, addDoc, setDoc, doc, getDocs, deleteDoc } = window.firebaseFns;
      const db = window.firebaseDB;
      
      // Borrar productos viejos
      const viejosDocs = await getDocs(collection(db, 'productos'));
      for (const d of viejosDocs.docs) {
        await deleteDoc(doc(db, 'productos', d.id));
      }
      
      // Agregar productos nuevos
      const productosGuardados = [];
      for (const p of productosNuevos) {
        const ref = await addDoc(collection(db, 'productos'), p);
        productosGuardados.push({ _id: ref.id, ...p });
      }
      productos = productosGuardados;
      listasDisponibles = colsPrecios.map(c => c.nombre);
      
      // Actualizar config
      if (!config) {
        config = {
          alias: 'thebutcher.lemon',
          titular: 'Juan Pablo Aduna',
          listaActiva: listasDisponibles[listasDisponibles.length - 1],
          listasDisponibles: listasDisponibles
        };
      } else if (!listasDisponibles.includes(config.listaActiva)) {
        config.listaActiva = listasDisponibles[listasDisponibles.length - 1];
        config.listasDisponibles = listasDisponibles;
      } else {
        config.listasDisponibles = listasDisponibles;
      }
      
      await setDoc(doc(db, 'config', 'main'), config);
      
      showToast(`✓ ${productosNuevos.length} productos cargados · ${listasDisponibles.length} listas de precios`, false, 'success');
      setTimeout(() => renderApp(), 800);
      
    } catch (err) {
      console.error(err);
      showToast('Error: ' + err.message, true);
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ============ AUTOCOMPLETE CLIENTE ============ */
function normalizar(s) {
  return String(s || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function onClienteInput() {
  const input = document.getElementById('cliente');
  const valor = input.value;
  const valorNorm = normalizar(valor);
  const sugg = document.getElementById('clienteSuggestions');
  
  const exacto = clientes.find(c => normalizar(c.nombre) === valorNorm);
  
  if (exacto && valor.trim() !== '') {
    clienteSeleccionado = exacto;
    if (!document.getElementById('telefono').value) {
      document.getElementById('telefono').value = exacto.telefono || '';
    }
    if (!document.getElementById('direccion').value) {
      document.getElementById('direccion').value = exacto.direccion || '';
    }
    mostrarInfoCliente(exacto);
    document.getElementById('clienteBadge').innerHTML = '<span class="badge-existing">✓ Existente</span>';
  } else {
    clienteSeleccionado = null;
    ocultarInfoCliente();
    if (valor.trim() !== '') {
      document.getElementById('clienteBadge').innerHTML = '<span class="badge-new">Nuevo</span>';
    } else {
      document.getElementById('clienteBadge').innerHTML = '';
    }
  }
  
  if (valorNorm.length >= 1) {
    const matches = clientes.filter(c => normalizar(c.nombre).includes(valorNorm)).slice(0, 8);
    
    if (matches.length > 0) {
      sugg.innerHTML = matches.map(c => {
        const idx = clientes.indexOf(c);
        return `
          <div class="autocomplete-item" onmousedown="seleccionarCliente(${idx})">
            <div class="name">${escapeHtml(c.nombre)}</div>
            <div class="meta">
              ${c.cantPedidos} pedido${c.cantPedidos !== 1 ? 's' : ''}
              ${c.telefono ? ' · ' + escapeHtml(c.telefono) : ''}
            </div>
          </div>
        `;
      }).join('');
      sugg.classList.add('active');
    } else {
      sugg.classList.remove('active');
    }
  } else {
    sugg.classList.remove('active');
  }
}

function onClienteBlur() {
  setTimeout(() => {
    document.getElementById('clienteSuggestions').classList.remove('active');
  }, 200);
}

function seleccionarCliente(idx) {
  const c = clientes[idx];
  document.getElementById('cliente').value = c.nombre;
  document.getElementById('telefono').value = c.telefono || '';
  document.getElementById('direccion').value = c.direccion || '';
  clienteSeleccionado = c;
  mostrarInfoCliente(c);
  document.getElementById('clienteBadge').innerHTML = '<span class="badge-existing">✓ Existente</span>';
  document.getElementById('clienteSuggestions').classList.remove('active');
}

function mostrarInfoCliente(c) {
  const box = document.getElementById('clienteInfoBox');
  const detail = document.getElementById('clienteInfoDetail');
  detail.textContent = `${c.cantPedidos} pedido${c.cantPedidos !== 1 ? 's' : ''} previo${c.cantPedidos !== 1 ? 's' : ''} · Total gastado: $${formatNum(c.totalGastado)}`;
  box.classList.add('active');
}

function ocultarInfoCliente() {
  const box = document.getElementById('clienteInfoBox');
  if (box) box.classList.remove('active');
}

function cerrarModal() {

}

function onProductoChange() {
  const idx = document.getElementById('selectProducto').value;
  if (idx === '') {
    document.getElementById('labelCantidadBox').style.display = 'none';
    return;
  }
  
  const p = productos[idx];
  const precio = p.precios[config.listaActiva];
  const label = document.getElementById('labelCantidad');
  const input = document.getElementById('inputCantidad');
  const hint = document.getElementById('hintPrecio');
  
  document.getElementById('labelCantidadBox').style.display = 'block';

    label.textContent = 'Peso (kg)';
    input.step = '0.001';

    hint.textContent = '💡 Precio: $' + formatNum(precio) + ' por kg';
  } else {
    label.textContent = 'Cantidad (unidades)';
    input.step = '1';
    input.placeholder = 'Ej: 2';
    hint.textContent = '💡 Precio: $' + formatNum(precio) + ' por unidad';
  }
  
  input.focus();
}

function confirmarAgregar() {
  const idx = document.getElementById('selectProducto').value;
  const cantidad = parseFloat(document.getElementById('inputCantidad').value);
  
  if (idx === '' || !cantidad || cantidad <= 0) {
    showToast('Completá producto y cantidad', true);
    return;
  }
  
  const p = productos[idx];
  const precio = p.precios[config.listaActiva];
  const subtotal = cantidad * precio;
  
  carrito.push({
    producto: p.nombre,
    tipo: p.tipo,
    pesoOCantidad: cantidad,
    precio: precio,
    subtotal: subtotal
  });
  
  renderCarrito();
  actualizarTotales();
  cerrarModal();
  showToast('Producto agregado ✓');
}

function eliminarItem(idx) {
  carrito.splice(idx, 1);
  renderCarrito();
  actualizarTotales();
}

function renderCarrito() {
  const cont = document.getElementById('cartList');
  if (carrito.length === 0) {
    cont.innerHTML = '<div class="cart-empty">Todavía no agregaste productos</div>';
    return;
  }
  
  cont.innerHTML = carrito.map((item, idx) => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${escapeHtml(item.producto)}</div>
        <div class="cart-item-detail">
          ${item.pesoOCantidad} ${item.tipo === 'kg' ? 'kg' : 'u'} × $${formatNum(item.precio)}
        </div>
      </div>
      <div class="cart-item-price">$${formatNum(item.subtotal)}</div>
      <button class="btn-danger-small" onclick="eliminarItem(${idx})" title="Eliminar">✕</button>
    </div>
  `).join('');
}

function actualizarTotales() {
  const subtotal = carrito.reduce((s, i) => s + i.subtotal, 0);
  const descPct = parseFloat(document.getElementById('descuento').value) || 0;
  const descMonto = subtotal * (descPct / 100);
  const total = subtotal - descMonto;
  
  document.getElementById('subtotalDisplay').textContent = '$' + formatNum(subtotal);
  document.getElementById('totalDisplay').textContent = '$' + formatNum(total);
  
  if (descPct > 0) {
    document.getElementById('descuentoRow').style.display = 'flex';
    document.getElementById('descuentoPct').textContent = '(' + descPct + '%)';
    document.getElementById('descuentoMontoDisplay').textContent = '-$' + formatNum(descMonto);
  } else {
    document.getElementById('descuentoRow').style.display = 'none';
  }
  
  document.getElementById('totalesBox').style.display = carrito.length > 0 ? 'block' : 'none';
  document.getElementById('btnGenerar').disabled = carrito.length === 0;
}

/* ============ GENERAR RESUMEN ============ */
function generarResumen() {
  const cliente = document.getElementById('cliente').value.trim();
  const telefono = document.getElementById('telefono').value.trim();
  const direccion = document.getElementById('direccion').value.trim();
  const fecha = document.getElementById('fecha').value;
  const estadoPedido = document.getElementById('estadoPedido').value;
  
  if (!cliente) {
    showToast('Ingresá el nombre del cliente', true);
    return;
  }
  if (carrito.length === 0) {
    showToast('Agregá al menos un producto', true);
    return;
  }
  
  const subtotal = carrito.reduce((s, i) => s + i.subtotal, 0);
  const descPct = parseFloat(document.getElementById('descuento').value) || 0;
  const descMonto = subtotal * (descPct / 100);
  const total = subtotal - descMonto;
  
  const pedido = {
    id: 'PED-' + Date.now(),
    cliente: cliente,
    telefono: telefono,
    direccion: direccion,
    fecha: fecha,
    listaPrecios: config.listaActiva,
    items: [...carrito],
    subtotalPedido: subtotal,
    descuentoPct: descPct,
    descuentoMonto: descMonto,
    totalFinal: total,
    alias: config.alias,
    titular: config.titular,
    timestamp: new Date().toISOString()
  };
  
  // Si el pedido se marca como pagado ahora, abrir modal de cobro primero
  if (estadoPedido === 'pagado') {
    abrirModalCobroNuevoPedido(pedido);
    return;
  }
  
  // Estado inicial: pendiente (si no viene de modal de cobro, que ya lo seteo)
  pedido.estado = 'pendiente';
  pedido.metodoPago = '';
  pedido.fechaPago = '';
  pedido.notasCobro = '';
  
  // Guardar en Firebase y mostrar resumen
  guardarPedidoEnFirebase(pedido);
  sessionStorage.setItem('pedidoActual', JSON.stringify(pedido));
  renderResumen(pedido);
}

function descargarImagen() {
  const el = document.getElementById('resumenCaptura');
  html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true }).then(canvas => {
    const p = JSON.parse(sessionStorage.getItem('pedidoActual'));
    const fileName = 'Butcher_' + p.cliente.replace(/\s+/g, '_') + '_' + p.fecha + '.png';
    const link = document.createElement('a');
    link.download = fileName;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Imagen descargada ✓', false, 'success');
  });
}

function compartirWhatsApp() {
  const p = JSON.parse(sessionStorage.getItem('pedidoActual'));
  const fechaFmt = formatFecha(p.fecha);
  
  let msg = `*🥩 THE BUTCHER - Resumen del Pedido*\n\n`;
  msg += `*Cliente:* ${p.cliente}\n`;
  msg += `*Fecha:* ${fechaFmt}\n`;
  if (p.telefono) msg += `*Tel:* ${p.telefono}\n`;
  if (p.direccion) msg += `*Dirección:* ${p.direccion}\n`;
  msg += `\n*Detalle:*\n`;
  
  p.items.forEach(i => {
    const qty = i.tipo === 'kg' ? i.pesoOCantidad.toFixed(3) + ' kg' : i.pesoOCantidad + ' u';
    msg += `• ${i.producto} - ${qty} × $${formatNum(i.precio)} = *$${formatNum(i.subtotal)}*\n`;
  });
  
  msg += `\n*Subtotal:* $${formatNum(p.subtotalPedido)}\n`;
  if (p.descuentoPct > 0) {
    msg += `*Descuento (${p.descuentoPct}%):* -$${formatNum(p.descuentoMonto)}\n`;
  }
  msg += `*TOTAL: $${formatNum(p.totalFinal)}*\n\n`;
  msg += `💳 *Datos de pago*\n`;
  msg += `Alias: ${p.alias}\n`;
  msg += `Titular: ${p.titular}`;
  
  const url = 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

/* ============ CONFIGURACIÓN ============ */
function abrirConfig() {
  document.getElementById('cfgAlias').value = config.alias || '';
  document.getElementById('cfgTitular').value = config.titular || '';
  
  const selectLista = document.getElementById('cfgLista');
  selectLista.innerHTML = '';
  listasDisponibles.forEach(l => {
    const opt = document.createElement('option');
    opt.value = l;
    opt.textContent = l;
    if (l === config.listaActiva) opt.selected = true;
    selectLista.appendChild(opt);
  });
  
  document.getElementById('modalConfig').classList.add('active');
}

function cerrarConfig() {
  document.getElementById('modalConfig').classList.remove('active');
}

async function guardarConfig() {
  config.alias = document.getElementById('cfgAlias').value.trim() || 'thebutcher.lemon';
  config.titular = document.getElementById('cfgTitular').value.trim() || 'Juan Pablo Aduna';
  config.listaActiva = document.getElementById('cfgLista').value;
  config.listasDisponibles = listasDisponibles;
  
  try {
    const { setDoc, doc } = window.firebaseFns;
    const db = window.firebaseDB;
    await setDoc(doc(db, 'config', 'main'), config);
    cerrarConfig();
    renderApp();
    showToast('✓ Configuración guardada', false, 'success');
  } catch(err) {
    showToast('Error: ' + err.message, true);
  }
}

/* ============ BACKUP ============ */
function exportarBackup() {
  const backup = {
    version: 1,
    fecha: new Date().toISOString(),
    productos: productos,
    config: config,
    pedidos: pedidos,
    clientes: clientes,
    listasDisponibles: listasDisponibles
  };
  
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'butcher_backup_' + new Date().toISOString().slice(0,10) + '.json';
  link.click();
  URL.revokeObjectURL(url);
  showToast('✓ Backup descargado', false, 'success');
}

function importarBackup() {
  if (!confirm('⚠️ Importar un backup va a REEMPLAZAR todos tus datos actuales. ¿Seguir?')) return;
  
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json';
  inp.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const backup = JSON.parse(ev.target.result);
        productos = backup.productos || [];
        config = backup.config || null;
        pedidos = backup.pedidos || [];
        clientes = backup.clientes || [];
        listasDisponibles = backup.listasDisponibles || [];
        guardarEnLocalStorage();
        renderApp();
        showToast('✓ Backup importado correctamente', false, 'success');
      } catch (err) {
        showToast('Error: archivo inválido', true);
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

/* ============ EXPORTAR PEDIDOS A EXCEL (V2) ============ */
function exportarPedidosExcel() {
  if (pedidos.length === 0) {
    showToast('No hay pedidos para exportar', true);
    return;
  }
  
  const wb = XLSX.utils.book_new();
  
  /* HOJA 1: PEDIDOS (1 fila por pedido - para tablas dinamicas) */
  const filasPedidos = [
    ['ID', 'Fecha', 'Cliente', 'Telefono', 'Direccion', 'Lista Precios',
     'Cant. Items', 'Subtotal', 'Descuento %', 'Descuento $', 'Total',
     'Estado', 'Metodo Pago', 'Fecha Cobro', 'Monto Cobrado', 'Saldo Pendiente', 'Notas Cobro']
  ];
  pedidos.forEach(p => {
    const estado = p.estado || 'pendiente';
    const montoCobrado = estado === 'pagado' ? p.totalFinal : (p.montoParcial || 0);
    const saldo = p.totalFinal - montoCobrado;
    filasPedidos.push([
      p.id || p._id,
      p.fecha,
      p.cliente,
      p.telefono || '',
      p.direccion || '',
      p.listaPrecios,
      p.items.length,
      p.subtotalPedido,
      p.descuentoPct || 0,
      p.descuentoMonto || 0,
      p.totalFinal,
      estado,
      p.metodoPago || '',
      p.fechaPago || '',
      montoCobrado,
      saldo,
      p.notasCobro || ''
    ]);
  });
  const wsPedidos = XLSX.utils.aoa_to_sheet(filasPedidos);
  XLSX.utils.book_append_sheet(wb, wsPedidos, 'Pedidos');
  
  /* HOJA 2: DETALLE DE ITEMS (1 fila por producto de cada pedido) */
  const filasDetalle = [
    ['ID Pedido', 'Fecha', 'Cliente', 'Producto', 'Tipo', 'Peso/Cantidad', 'Precio Unit', 'Subtotal']
  ];
  pedidos.forEach(p => {
    p.items.forEach(item => {
      filasDetalle.push([
        p.id || p._id,
        p.fecha,
        p.cliente,
        item.producto,
        item.tipo,
        item.pesoOCantidad,
        item.precio,
        item.subtotal
      ]);
    });
  });
  const wsDetalle = XLSX.utils.aoa_to_sheet(filasDetalle);
  XLSX.utils.book_append_sheet(wb, wsDetalle, 'Detalle Items');
  
  /* HOJA 3: RESUMEN MENSUAL */
  const resumenPorMes = {};
  pedidos.forEach(p => {
    const mes = p.fecha ? p.fecha.slice(0, 7) : 'Sin fecha'; // YYYY-MM
    if (!resumenPorMes[mes]) {
      resumenPorMes[mes] = {
        cantPedidos: 0, facturado: 0, cobrado: 0, pendiente: 0,
        transferencia: 0, efectivo: 0, mercadopago: 0, otro: 0
      };
    }
    const r = resumenPorMes[mes];
    r.cantPedidos++;
    r.facturado += (p.totalFinal || 0);
    
    const estado = p.estado || 'pendiente';
    if (estado === 'pagado') {
      r.cobrado += (p.totalFinal || 0);
      const metodo = (p.metodoPago || '').toLowerCase();
      if (metodo.includes('transfer')) r.transferencia += p.totalFinal;
      else if (metodo.includes('efectivo')) r.efectivo += p.totalFinal;
      else if (metodo.includes('mercado')) r.mercadopago += p.totalFinal;
      else r.otro += p.totalFinal;
    } else if (estado === 'parcial') {
      r.cobrado += (p.montoParcial || 0);
      r.pendiente += (p.totalFinal - (p.montoParcial || 0));
      const metodo = (p.metodoPago || '').toLowerCase();
      const monto = p.montoParcial || 0;
      if (metodo.includes('transfer')) r.transferencia += monto;
      else if (metodo.includes('efectivo')) r.efectivo += monto;
      else if (metodo.includes('mercado')) r.mercadopago += monto;
      else r.otro += monto;
    } else {
      r.pendiente += (p.totalFinal || 0);
    }
  });
  
  const mesesOrdenados = Object.keys(resumenPorMes).sort();
  const filasResumen = [
    ['Mes', 'Cant. Pedidos', 'Facturado', 'Cobrado', 'Pendiente',
     'Transferencia', 'Efectivo', 'Mercado Pago', 'Otro']
  ];
  mesesOrdenados.forEach(mes => {
    const r = resumenPorMes[mes];
    filasResumen.push([
      mes, r.cantPedidos, r.facturado, r.cobrado, r.pendiente,
      r.transferencia, r.efectivo, r.mercadopago, r.otro
    ]);
  });
  // Fila de totales
  if (mesesOrdenados.length > 0) {
    const tot = { cantPedidos: 0, facturado: 0, cobrado: 0, pendiente: 0, transferencia: 0, efectivo: 0, mercadopago: 0, otro: 0 };
    mesesOrdenados.forEach(m => {
      const r = resumenPorMes[m];
      tot.cantPedidos += r.cantPedidos;
      tot.facturado += r.facturado;
      tot.cobrado += r.cobrado;
      tot.pendiente += r.pendiente;
      tot.transferencia += r.transferencia;
      tot.efectivo += r.efectivo;
      tot.mercadopago += r.mercadopago;
      tot.otro += r.otro;
    });
    filasResumen.push([
      'TOTAL', tot.cantPedidos, tot.facturado, tot.cobrado, tot.pendiente,
      tot.transferencia, tot.efectivo, tot.mercadopago, tot.otro
    ]);
  }
  const wsResumen = XLSX.utils.aoa_to_sheet(filasResumen);
  XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen Mensual');
  
  /* HOJA 4: CLIENTES */
  const filasClientes = [
    ['ID', 'Nombre', 'Telefono', 'Direccion', 'Fecha Alta', 'Ultimo Pedido', 'Cant. Pedidos', 'Total Gastado', 'Notas']
  ];
  clientes.forEach(c => {
    filasClientes.push([
      c.id || c._id, c.nombre, c.telefono, c.direccion,
      c.fechaAlta, c.ultimoPedido, c.cantPedidos, c.totalGastado, c.notas || ''
    ]);
  });
  const wsClientes = XLSX.utils.aoa_to_sheet(filasClientes);
  XLSX.utils.book_append_sheet(wb, wsClientes, 'Clientes');
  
  /* HOJA 5: PENDIENTES DE COBRO */
  const pendientes = pedidos.filter(p => (p.estado || 'pendiente') !== 'pagado');
  const filasPendientes = [
    ['Fecha', 'Cliente', 'Telefono', 'Total', 'Cobrado', 'Saldo Pendiente', 'Estado', 'Dias de atraso']
  ];
  const hoy = new Date();
  pendientes.forEach(p => {
    const fecha = new Date(p.fecha);
    const dias = Math.floor((hoy - fecha) / (1000 * 60 * 60 * 24));
    const cobrado = p.estado === 'parcial' ? (p.montoParcial || 0) : 0;
    const saldo = p.totalFinal - cobrado;
    filasPendientes.push([
      p.fecha, p.cliente, p.telefono || '',
      p.totalFinal, cobrado, saldo,
      p.estado || 'pendiente', dias
    ]);
  });
  // Ordenar por dias de atraso descendente
  const header = filasPendientes[0];
  const data = filasPendientes.slice(1).sort((a, b) => b[7] - a[7]);
  const filasPendientesOrdenadas = [header, ...data];
  const wsPendientes = XLSX.utils.aoa_to_sheet(filasPendientesOrdenadas);
  XLSX.utils.book_append_sheet(wb, wsPendientes, 'Pendientes de Cobro');
  
  XLSX.writeFile(wb, 'Butcher_Reporte_' + new Date().toISOString().slice(0,10) + '.xlsx');
  showToast('Reporte descargado con 5 hojas', false, 'success');
}

/* ============ DASHBOARD + SEGUIMIENTO DE PAGOS ============ */
function renderDashboardStats() {
  const ahora = new Date();
  const mesActual = ahora.getMonth();
  const anioActual = ahora.getFullYear();
  
  let porCobrar = 0;
  let cobradoMes = 0;
  let cantPendientes = 0;
  let cantMes = 0;
  
  pedidos.forEach(p => {
    const fechaPedido = new Date(p.fecha);
    const esMesActual = fechaPedido.getMonth() === mesActual && fechaPedido.getFullYear() === anioActual;
    
    if (p.estado === 'pagado') {
      if (esMesActual) cobradoMes += (p.totalFinal || 0);
    } else if (p.estado === 'parcial') {
      porCobrar += (p.totalFinal || 0) - (p.montoParcial || 0);
      cantPendientes++;
    } else {
      // pendiente (default)
      porCobrar += (p.totalFinal || 0);
      cantPendientes++;
    }
    
    if (esMesActual) cantMes++;
  });
  
  return `
    <div style="background:#fff3e0; padding:12px; border-radius:8px; border-left:3px solid #f57c00;">
      <div style="font-size:11px; color:#666; text-transform:uppercase;">Por cobrar</div>
      <div style="font-size:18px; font-weight:700; color:#e65100;">$${formatNum(porCobrar)}</div>
      <div style="font-size:10px; color:#999;">${cantPendientes} pedido${cantPendientes !== 1 ? 's' : ''}</div>
    </div>
    <div style="background:#e8f5e9; padding:12px; border-radius:8px; border-left:3px solid #2e7d32;">
      <div style="font-size:11px; color:#666; text-transform:uppercase;">Cobrado este mes</div>
      <div style="font-size:18px; font-weight:700; color:#1b5e20;">$${formatNum(cobradoMes)}</div>
      <div style="font-size:10px; color:#999;">${cantMes} pedido${cantMes !== 1 ? 's' : ''} del mes</div>
    </div>
  `;
}

    pagado: { bg: '#e8f5e9', border: '#2e7d32', text: '#1b5e20', chipBg: '#2e7d32', label: '✅ PAGADO' }
  };
  const c = colores[estado] || colores.pendiente;
  const metodoPagoLabel = p.metodoPago ? ` · ${p.metodoPago}` : '';
  
  // Badge de estado bien visible arriba a la derecha

    <div style="background:${c.bg}; border-left:4px solid ${c.border}; padding:12px; border-radius:8px; margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; align-items:start; gap:10px; margin-bottom:8px;">
        <div style="flex:1;">

            <div style="font-weight:700; color:var(--navy); font-size:15px;">${escapeHtml(p.cliente)}</div>
            ${estadoBadge}
          </div>
          <div style="font-size:11px; color:#666; margin-top:4px;">${formatFecha(p.fecha)} · ${p.items.length} ítem${p.items.length !== 1 ? 's' : ''}${metodoPagoLabel}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-weight:700; font-size:16px; color:var(--navy);">$${formatNum(p.totalFinal)}</div>
        </div>
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:6px; margin-top:8px;">
        ${estado !== 'pagado' ? `<button class="btn-chip btn-chip-green" onclick="marcarPagado('${p._id}')">💰 Marcar pagado</button>` : `<button class="btn-chip" onclick="marcarPendiente('${p._id}')">↩️ Revertir a pendiente</button>`}
        <button class="btn-chip" onclick="verDetallePedido('${p._id}')">👁️ Ver</button>
        <button class="btn-chip btn-chip-red" onclick="eliminarPedido('${p._id}')">🗑️ Eliminar</button>
      </div>
    </div>
  `;
}

function cambiarFiltroEstado(valor) {
  filtroEstado = valor;
  renderPedidos();
}

function cambiarFiltroCliente(valor) {
  filtroCliente = valor;
  // Debounce simple
  clearTimeout(window._filtroTimeout);
  window._filtroTimeout = setTimeout(() => renderPedidos(), 300);
}

function cambiarEstadoPedido(estado) {
  document.getElementById('estadoPedido').value = estado;
  document.querySelectorAll('.estado-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.estado-btn[data-estado="' + estado + '"]').classList.add('selected');
  
  const info = document.getElementById('infoEstadoPago');
  if (estado === 'pagado') {
    info.innerHTML = '✅ Al generar el resumen vas a elegir método de pago y fecha';
    info.style.background = '#e8f5e9';
    info.style.color = '#1b5e20';
  } else {
    info.innerHTML = '💡 Cuando cobres, lo marcás desde "Ver todos los pedidos"';
    info.style.background = 'var(--cream)';
    info.style.color = '#666';
  }
}

// Estado: pedido nuevo pendiente de cobro (antes de guardar)
let pedidoNuevoPendiente = null;

function abrirModalCobroNuevoPedido(pedido) {
  pedidoNuevoPendiente = pedido;
  pedidoIdCobro = null;
  
  // Setear fecha de cobro por default hoy
  document.getElementById('cobroFecha').valueAsDate = new Date();
  document.getElementById('cobroNotas').value = '';
  document.getElementById('cobroMontoParcial').value = '';
  document.getElementById('cobroPedidoInfo').innerHTML = `
    <div style="font-weight:600; color:var(--navy);">${escapeHtml(pedido.cliente)}</div>
    <div style="font-size:13px; color:#666;">${formatFecha(pedido.fecha)} · Total: $${formatNum(pedido.totalFinal)}</div>
    <div style="font-size:11px; color:#1b5e20; margin-top:4px;">🆕 Pedido nuevo - registrá el cobro</div>
  `;
  
  // Deseleccionar metodos
  document.querySelectorAll('.metodo-pago-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('cobroSeccionParcial').style.display = 'none';
  document.getElementById('cobroTipo').value = 'completo';
  document.querySelectorAll('.tipo-pago-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.tipo-pago-btn[data-tipo="completo"]').classList.add('selected');
  document.getElementById('cobroMetodo').value = '';
  
  document.getElementById('modalCobro').classList.add('active');
}

let pedidoIdCobro = null;

function marcarPagado(pedidoId) {
  const pedido = pedidos.find(p => p._id === pedidoId);
  if (!pedido) return;
  pedidoIdCobro = pedidoId;
  
  // Resetear form
  document.getElementById('cobroFecha').valueAsDate = new Date();
  document.getElementById('cobroNotas').value = '';
  document.getElementById('cobroMontoParcial').value = '';
  document.getElementById('cobroPedidoInfo').innerHTML = `
    <div style="font-weight:600; color:var(--navy);">${escapeHtml(pedido.cliente)}</div>
    <div style="font-size:13px; color:#666;">${formatFecha(pedido.fecha)} · Total: $${formatNum(pedido.totalFinal)}</div>
  `;
  
  // Deseleccionar métodos
  document.querySelectorAll('.metodo-pago-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('cobroSeccionParcial').style.display = 'none';
  document.getElementById('cobroTipo').value = 'completo';
  
  document.getElementById('modalCobro').classList.add('active');
}

function cerrarModalCobro() {
  document.getElementById('modalCobro').classList.remove('active');
  pedidoIdCobro = null;
  // Si era un pedido nuevo y se cancela, NO se guarda - se mantiene el estado del form
  if (pedidoNuevoPendiente) {
    pedidoNuevoPendiente = null;
    showToast('Pedido no guardado. Podés cambiar el estado y generar de nuevo.', false);
  }
}

function seleccionarMetodo(btn, metodo) {
  document.querySelectorAll('.metodo-pago-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('cobroMetodo').value = metodo;
}

function toggleTipoPago(tipo) {
  document.getElementById('cobroTipo').value = tipo;
  document.getElementById('cobroSeccionParcial').style.display = tipo === 'parcial' ? 'block' : 'none';
  document.querySelectorAll('.tipo-pago-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector('.tipo-pago-btn[data-tipo="' + tipo + '"]').classList.add('selected');
}

async function confirmarCobro() {
  const metodo = document.getElementById('cobroMetodo').value;
  const fecha = document.getElementById('cobroFecha').value;
  const notas = document.getElementById('cobroNotas').value.trim();
  const tipo = document.getElementById('cobroTipo').value;
  
  if (!metodo) {
    showToast('Elegí un método de pago', true);
    return;
  }
  
  // CASO 1: Es un pedido nuevo (desde el form de carga)
  if (pedidoNuevoPendiente) {
    const pedido = pedidoNuevoPendiente;
    
    if (tipo === 'parcial') {
      const monto = parseFloat(document.getElementById('cobroMontoParcial').value);
      if (!monto || monto <= 0 || monto >= pedido.totalFinal) {
        showToast('Ingresá un monto parcial válido (menor al total)', true);
        return;
      }
      pedido.estado = 'parcial';
      pedido.montoParcial = monto;
    } else {
      pedido.estado = 'pagado';
      pedido.montoParcial = pedido.totalFinal;
    }
    
    pedido.metodoPago = metodo;
    pedido.fechaPago = fecha;
    pedido.notasCobro = notas;
    
    // Guardar en Firebase y mostrar resumen
    cerrarModalCobro();
    pedidoNuevoPendiente = null;
    await guardarPedidoEnFirebase(pedido);
    sessionStorage.setItem('pedidoActual', JSON.stringify(pedido));
    renderResumen(pedido);
    showToast(tipo === 'parcial' ? '💵 Pedido guardado con pago parcial' : '✅ Pedido guardado como pagado', false, 'success');
    return;
  }
  
  // CASO 2: Es un pedido existente (desde Seguimiento)
  if (!pedidoIdCobro) return;
  
  const pedido = pedidos.find(p => p._id === pedidoIdCobro);
  if (!pedido) return;
  
  const updates = {
    metodoPago: metodo,
    fechaPago: fecha,
    notasCobro: notas
  };
  
  if (tipo === 'parcial') {
    const monto = parseFloat(document.getElementById('cobroMontoParcial').value);
    if (!monto || monto <= 0 || monto >= pedido.totalFinal) {
      showToast('Ingresá un monto parcial válido (menor al total)', true);
      return;
    }
    updates.estado = 'parcial';
    updates.montoParcial = monto;
  } else {
    updates.estado = 'pagado';
    updates.montoParcial = pedido.totalFinal;
  }
  
  try {
    const { updateDoc, doc } = window.firebaseFns;
    const db = window.firebaseDB;
    await updateDoc(doc(db, 'pedidos', pedidoIdCobro), updates);
    cerrarModalCobro();
    showToast(tipo === 'parcial' ? '💵 Pago parcial registrado' : '✅ Pedido marcado como pagado', false, 'success');
  } catch(err) {
    showToast('Error: ' + err.message, true);
  }
}

// Funcion helper para guardar pedido en Firebase (extraida para reusar)
async function guardarPedidoEnFirebase(pedido) {
  try {
    const { collection, addDoc, updateDoc, doc } = window.firebaseFns;
    const db = window.firebaseDB;
    
    // Upsert cliente
    const clienteNorm = normalizar(pedido.cliente);
    let clienteExistente = clientes.find(c => normalizar(c.nombre) === clienteNorm);
    
    if (clienteExistente) {
      const updatesC = {
        ultimoPedido: pedido.fecha,
        cantPedidos: (clienteExistente.cantPedidos || 0) + 1,
        totalGastado: (clienteExistente.totalGastado || 0) + pedido.totalFinal
      };
      if (pedido.telefono && !clienteExistente.telefono) updatesC.telefono = pedido.telefono;
      if (pedido.direccion && !clienteExistente.direccion) updatesC.direccion = pedido.direccion;
      await updateDoc(doc(db, 'clientes', clienteExistente._id), updatesC);
    } else {
      const nuevoCliente = {
        nombre: pedido.cliente,
        telefono: pedido.telefono,
        direccion: pedido.direccion,
        fechaAlta: pedido.fecha,
        ultimoPedido: pedido.fecha,
        cantPedidos: 1,
        totalGastado: pedido.totalFinal,
        notas: ''
      };
      await addDoc(collection(db, 'clientes'), nuevoCliente);
      showToast('✓ Cliente nuevo agregado a tu base', false, 'success');
    }
    
    await addDoc(collection(db, 'pedidos'), pedido);
  } catch(err) {
    console.error('Error guardando en Firebase:', err);
    showToast('⚠️ Error guardando en la nube', true);
  }
}

async function marcarPendiente(pedidoId) {
  if (!confirm('¿Marcar este pedido como pendiente de nuevo?')) return;
  try {
    const { updateDoc, doc } = window.firebaseFns;
    const db = window.firebaseDB;
    await updateDoc(doc(db, 'pedidos', pedidoId), {
      estado: 'pendiente',
      metodoPago: '',
      fechaPago: ''
    });
    showToast('↩️ Marcado como pendiente', false, 'success');
  } catch(err) {
    showToast('Error: ' + err.message, true);
  }
}

function verDetallePedido(pedidoId) {
  const pedido = pedidos.find(p => p._id === pedidoId);
  if (!pedido) return;
  sessionStorage.setItem('pedidoActual', JSON.stringify(pedido));
  renderResumen(pedido);
}

async function eliminarPedido(pedidoId) {
  const pedido = pedidos.find(p => p._id === pedidoId);
  if (!pedido) return;
  if (!confirm(`¿Eliminar el pedido de "${pedido.cliente}" por $${formatNum(pedido.totalFinal)}?\n\nEsta acción no se puede deshacer.`)) return;
  
  try {
    const { deleteDoc, doc, updateDoc } = window.firebaseFns;
    const db = window.firebaseDB;
    await deleteDoc(doc(db, 'pedidos', pedidoId));
    
    // Actualizar cliente (restar del total gastado)
    const cliente = clientes.find(c => normalizar(c.nombre) === normalizar(pedido.cliente));
    if (cliente) {
      await updateDoc(doc(db, 'clientes', cliente._id), {
        cantPedidos: Math.max(0, (cliente.cantPedidos || 1) - 1),
        totalGastado: Math.max(0, (cliente.totalGastado || 0) - (pedido.totalFinal || 0))
      });
    }
    
    showToast('🗑️ Pedido eliminado', false, 'success');
  } catch(err) {
    showToast('Error: ' + err.message, true);
  }
}

/* ============ HELPERS ============ */
function formatNum(n) {
  return Number(n).toLocaleString('es-AR', { 
    minimumFractionDigits: 2, 
    maximumFractionDigits: 2 
  });
}

function formatFecha(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y.slice(2)}`;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function showToast(msg, isError, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  let cls = 'toast show';
  if (isError) cls += ' error';
  else if (type === 'success') cls += ' success';
  t.className = cls;
  setTimeout(() => t.classList.remove('show'), 2500);
}
